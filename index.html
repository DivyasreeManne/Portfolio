<!DOCTYPE html>
<html>
<head>
    <title>Divyasree Manne - Data Analyst</title>
    <style>
        /* This removes default spacing and sets the font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* This styles the whole page */
        body {
            font-family: Georgia, serif;
            background-color: #0C0F14;
            color: #E8EAF0;
        }

        /* This is the top banner section */
        .hero {
            text-align: center;
            padding: 120px 20px 80px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .hero .highlight {
            color: #4AE3B5;
        }

        .hero p {
            font-size: 18px;
            color: #8B90A0;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Divyasree <span class="highlight">Manne</span></h1>
        <p>Data Analyst | Memphis, TN</p>
        <p>3+ years turning complex healthcare and financial data into clear business decisions.</p>
    </div>

</body>
</html>
